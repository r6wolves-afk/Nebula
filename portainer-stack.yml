services:
  nebula:
    image: ghcr.io/r6wolves-afk/nebula:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      NEBULA_HOST: 0.0.0.0
      NEBULA_PORT: 8787
      NEBULA_DATA_DIR: /data
      NEBULA_GITHUB_OWNER: r6wolves-afk
      NEBULA_ADDON_REPO_PREFIX: Nebula-
      NEBULA_GITHUB_DISCOVERY: "true"
      NEBULA_GITHUB_TOKEN: "${NEBULA_GITHUB_TOKEN:-}"
      NEBULA_MAX_UPLOAD_BYTES: 1073741824
    volumes:
      - /opt/nebula/data:/data
